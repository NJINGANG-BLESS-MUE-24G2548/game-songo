<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 SONGO Online - Toghu Authentique 🏆</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: 'Georgia', serif; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%); color: #f0f0f0; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.05) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255, 68, 68, 0.05) 0%, transparent 50%); pointer-events: none; z-index: 0; }
        .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        .toghu-top, .toghu-bottom { width: 100%; height: 120px; position: relative; margin-bottom: 30px; display: flex; justify-content: center; align-items: center; }
        .toghu-bottom { margin-bottom: 0; margin-top: 30px; order: 10; }
        .toghu-pattern { display: flex; gap: 40px; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .spider { width: 100px; height: 100px; position: relative; }
        .spider-body { width: 20px; height: 20px; background: #ffdd00; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(255, 221, 0, 0.8); }
        .spider-leg { position: absolute; background: linear-gradient(90deg, #ffdd00, #ff4444); height: 4px; border-radius: 2px; top: 50%; left: 50%; transform-origin: 0 50%; box-shadow: 0 0 5px rgba(255, 221, 0, 0.6); }
        .diamond { width: 60px; height: 60px; position: relative; }
        .diamond-outer { width: 100%; height: 100%; border: 4px solid #ff4444; transform: rotate(45deg); position: relative; box-shadow: 0 0 8px rgba(255, 68, 68, 0.7); }
        .diamond-inner { width: 100%; height: 100%; border: 2px solid #ffdd00; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.6); box-shadow: 0 0 5px rgba(255, 221, 0, 0.6); }
        .gong { width: 70px; height: 70px; border: 5px solid #44dd44; border-radius: 50%; position: relative; box-shadow: 0 0 10px rgba(68, 221, 68, 0.7), inset 0 0 10px rgba(68, 221, 68, 0.3); }
        .gong::before { content: ''; position: absolute; width: 40px; height: 40px; border: 2px solid #ffdd00; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 5px rgba(255, 221, 0, 0.6); }
        .gong::after { content: ''; position: absolute; width: 20px; height: 20px; background: #44dd44; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px rgba(68, 221, 68, 0.9); }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 30px; background: linear-gradient(135deg, rgba(0, 0, 0, 0.9) 0%, rgba(20, 10, 0, 0.95) 100%); border-radius: 12px; border: 3px solid #ffdd00; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 221, 0, 0.3); }
        .logo-section { display: flex; align-items: center; gap: 20px; }
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .cameroon-map { width: 50px; height: 65px; background: linear-gradient(135deg, #ffdd00 0%, #ff4444 50%, #44dd44 100%); clip-path: polygon(30% 0%, 70% 5%, 90% 20%, 100% 40%, 85% 60%, 70% 80%, 50% 100%, 30% 85%, 15% 70%, 5% 50%, 10% 30%, 20% 10%); box-shadow: 0 0 15px rgba(255, 221, 0, 0.5); border: 2px solid #ffdd00; position: relative; }
        .cameroon-map::after { content: '★'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffdd00; font-size: 12px; }
        .logo { font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, #ffdd00 0%, #ff4444 50%, #44dd44 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 3px; text-transform: uppercase; }
        .subtitle { font-size: 0.85rem; color: #ffdd00; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        .controls { display: flex; gap: 15px; }
        button { padding: 14px 28px; border: 2px solid #ffdd00; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1.5px; background: linear-gradient(135deg, #8b0000 0%, #4b0000 100%); color: #ffdd00; box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5); }
        button:hover { transform: translateY(-3px); background: linear-gradient(135deg, #ff4444 0%, #8b0000 100%); box-shadow: 0 10px 25px rgba(255, 68, 68, 0.3); border-color: #fff; }
        .game-info { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 20px; margin-bottom: 30px; align-items: center; }
        .player-card { background: linear-gradient(135deg, rgba(255, 221, 0, 0.1) 0%, rgba(255, 68, 68, 0.1) 100%); padding: 25px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5); text-align: center; border: 2px solid #ffdd00; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .player-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255, 221, 0, 0.1) 5px, rgba(255, 221, 0, 0.1) 10px); pointer-events: none; }
        .player-card h3 { font-size: 1.2rem; color: #ffdd00; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; font-weight: 600; position: relative; z-index: 1; }
        .score-box { display: flex; flex-direction: column; gap: 5px; position: relative; z-index: 1; }
        .score { font-size: 2.8rem; font-weight: 900; background: linear-gradient(135deg, #ffdd00 0%, #ff4444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
        .label { font-size: 0.8rem; color: #ffdd00; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .player-card.active { border-color: #ff4444; background: linear-gradient(135deg, rgba(255, 68, 68, 0.25) 0%, rgba(68, 221, 68, 0.15) 100%); transform: scale(1.02); box-shadow: 0 0 30px rgba(255, 221, 0, 0.5); }
        .status-panel { background: linear-gradient(135deg, rgba(0, 0, 0, 0.9) 0%, rgba(20, 10, 0, 0.95) 100%); padding: 30px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5); text-align: center; border: 2px solid #ffdd00; }
        .turn-indicator { font-size: 1rem; color: #ffdd00; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-weight: 600; }
        #current-turn { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, #ffdd00 0%, #ff4444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .game-state { padding: 15px 20px; background: linear-gradient(135deg, #ffdd00 0%, #ff4444 100%); border-radius: 8px; color: #000; font-size: 0.95rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 6px 15px rgba(255, 221, 0, 0.4); margin-top: 15px; }
        .board-container { background: linear-gradient(135deg, #5d4037 0%, #4e342e 50%, #3d2817 100%); padding: 4vw; border-radius: 16px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1); margin-bottom: 30px; border: 0.8vw solid #2c1810; position: relative; width: 95%; max-width: 1200px; margin-left: auto; margin-right: auto; }
        .board { display: flex; flex-direction: column; gap: 50px; }
        .row { display: flex; justify-content: space-around; gap: 20px; }
        .pit { width: 8vw; height: 8vw; max-width: 110px; max-height: 110px; min-width: 40px; min-height: 40px; background: radial-gradient(circle at 50% 50%, #2c1810 0%, #3e2723 60%, #5d4037 100%); border-radius: 50%; position: relative; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 15px 25px rgba(0, 0, 0, 0.8), inset 0 -5px 15px rgba(255, 255, 255, 0.1), 0 10px 20px rgba(0, 0, 0, 0.5); border: 0.3vw solid #1a0f0a; overflow: visible; }
        .pit:hover:not(.disabled) { background: radial-gradient(circle at 30% 30%, #6d4c41, #4e342e); transform: scale(1.08); box-shadow: inset 0 8px 16px rgba(0, 0, 0, 0.6), inset 0 -8px 16px rgba(0, 0, 0, 0.4), 0 12px 24px rgba(255, 221, 0, 0.3); }
        .pit.disabled { cursor: not-allowed; opacity: 0.7; }
        .pit-label { position: absolute; top: -32px; width: 100%; text-align: center; color: #ffdd00; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .seeds-count { position: absolute; bottom: -32px; width: 100%; text-align: center; color: #ffdd00; font-size: 1rem; font-weight: 800; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5); }
        .seeds-container { position: relative; width: 100%; height: 100%; }
        .seed { width: 1.8vw; height: 1.8vw; max-width: 20px; max-height: 20px; min-width: 10px; min-height: 10px; background: #ffdd00; border-radius: 50%; box-shadow: inset -2px -2px 4px rgba(0, 0, 0, 0.4), 0 2px 4px rgba(0, 0, 0, 0.6); border: 1px solid #000; position: absolute; transition: all 0.3s ease; }
        .seed::after { display: none; }

        /* STYLES SPÉCIFIQUES MODE DISTANT */
        #setup-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .setup-box { background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%); padding: 40px; border-radius: 15px; border: 3px solid #ffdd00; box-shadow: 0 0 30px rgba(255, 221, 0, 0.3); }
        .setup-btn { margin: 15px; padding: 15px 30px; cursor: pointer; }
        #room-input { padding: 12px; border-radius: 8px; border: 2px solid #ffdd00; background: #000; color: #fff; width: 200px; text-align: center; font-size: 1.2rem; margin: 10px; }
        .room-badge { background: #ffdd00; color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; margin-top: 10px; display: inline-block; }
        #game-container { display: none; }
    </style>
</head>
<body>
    <div id="setup-screen">
        <div class="setup-box">
            <div class="logo">🏆 SONGO ONLINE</div>
            <p style="color: #ffdd00; margin: 20px 0; font-weight: bold;">Toghu Authentique - Mode Distant</p>
            <button class="setup-btn" onclick="createRoom()">CRÉER UNE SALLE</button>
            <div style="margin: 20px 0; color: #ffdd00;">— OU —</div>
            <input type="text" id="room-input" placeholder="CODE SALLE">
            <button class="setup-btn" onclick="joinRoom()" style="background: linear-gradient(135deg, #1a4a1a 0%, #0a2a0a 100%); border-color: #44dd44; color: #44dd44;">REJOINDRE</button>
        </div>
    </div>

    <div id="game-container" class="container">
        <div class="toghu-top">
            <div class="toghu-pattern">
                <div class="spider"><div class="spider-body"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(0deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(45deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(90deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(135deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(180deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(225deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(270deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(315deg);"></div></div>
                <div class="diamond"><div class="diamond-outer"><div class="diamond-inner"></div></div></div>
                <div class="gong"></div>
                <div class="diamond"><div class="diamond-outer"><div class="diamond-inner"></div></div></div>
                <div class="spider"><div class="spider-body"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(0deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(45deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(90deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(135deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(180deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(225deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(270deg);"></div><div class="spider-leg" style="width: 50px; transform: translate(-50%, -50%) rotate(315deg);"></div></div>
            </div>
        </div>

        <header>
            <div class="logo-section">
                <div class="logo-container">
                    <div class="cameroon-map"></div>
                    <div>
                        <div class="logo">🏆 SONGO</div>
                        <div class="subtitle">Online - Salle: <span id="room-code-display">...</span></div>
                        <div class="room-badge" id="role-display">Attente...</div>
                    </div>
                </div>
            </div>
            <div class="controls">
                <button id="rules-btn">RÈGLES</button>
                <button onclick="location.reload()">QUITTER</button>
            </div>
        </header>

        <main>
            <div class="game-info">
                <div class="player-card" id="player-north">
                    <h3>Nord (Adversaire)</h3>
                    <div class="score-box"><span class="score" id="score-north">0</span><span class="label">Graines</span></div>
                </div>
                <div class="status-panel">
                    <div class="turn-indicator">Tour : <span id="current-turn">...</span></div>
                    <div class="game-state" id="game-message">Initialisation...</div>
                </div>
                <div class="player-card" id="player-south">
                    <h3>Sud (Vous)</h3>
                    <div class="score-box"><span class="score" id="score-south">0</span><span class="label">Graines</span></div>
                </div>
            </div>

            <div class="board-container">
                <div class="board">
                    <div class="row north-row">
                        <div class="pit" data-index="13"><div class="pit-label">N7</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                        <div class="pit" data-index="12"><div class="pit-label">N6</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                        <div class="pit" data-index="11"><div class="pit-label">N5</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                        <div class="pit" data-index="10"><div class="pit-label">N4</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                        <div class="pit" data-index="9"><div class="pit-label">N3</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                        <div class="pit" data-index="8"><div class="pit-label">N2</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                        <div class="pit" data-index="7"><div class="pit-label">N1</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                    </div>
                    <div class="board-divider"></div>
                    <div class="row south-row">
                        <div class="pit" data-index="0"><div class="pit-label">S1</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                        <div class="pit" data-index="1"><div class="pit-label">S2</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                        <div class="pit" data-index="2"><div class="pit-label">S3</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                        <div class="pit" data-index="3"><div class="pit-label">S4</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                        <div class="pit" data-index="4"><div class="pit-label">S5</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                        <div class="pit" data-index="5"><div class="pit-label">S6</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                        <div class="pit" data-index="6"><div class="pit-label">S7</div><div class="seeds-count">4</div><div class="seeds-container"></div></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let roomCode = null;
        let playerRole = null;
        let gameInterval = null;

        function showMessage(msg) { document.getElementById('game-message').innerText = msg; }

        async function createRoom() {
            try {
                const response = await fetch('create_room.php');
                const data = await response.json();
                if (data.success) { roomCode = data.room_code; playerRole = data.player_role; enterGame(); }
            } catch (e) { alert("Erreur serveur"); }
        }

        async function joinRoom() {
            const code = document.getElementById('room-input').value.toUpperCase();
            if (!code) return alert("Code requis");
            const formData = new FormData();
            formData.append('room_code', code);
            try {
                const response = await fetch('join_room.php', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.success) { roomCode = data.room_code; playerRole = data.player_role; enterGame(); }
                else { alert(data.message); }
            } catch (e) { alert("Erreur serveur"); }
        }

        function enterGame() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('room-code-display').innerText = roomCode;
            document.getElementById('role-display').innerText = playerRole === 'south' ? "Joueur SUD" : "Joueur NORD";
            startPolling();
            setupEventListeners();
        }

        function setupEventListeners() {
            document.querySelectorAll('.pit').forEach(pit => {
                pit.addEventListener('click', () => { handleMove(parseInt(pit.dataset.index)); });
            });
        }

        function startPolling() { updateGameState(); gameInterval = setInterval(updateGameState, 2000); }

        async function updateGameState() {
            if (!roomCode) return;
            try {
                const response = await fetch(`get_state.php?room_code=${roomCode}`);
                const result = await response.json();
                if (result.success) { renderBoard(result.data); }
            } catch (e) { console.error("Sync error"); }
        }

        function renderBoard(data) {
            document.getElementById('score-south').innerText = data.score_south;
            document.getElementById('score-north').innerText = data.score_north;
            document.getElementById('current-turn').innerText = data.current_turn === 'south' ? 'Sud' : 'Nord';
            document.getElementById('player-south').classList.toggle('active', data.current_turn === 'south');
            document.getElementById('player-north').classList.toggle('active', data.current_turn === 'north');
            
            data.board.forEach((seeds, i) => {
                const pit = document.querySelector(`.pit[data-index="${i}"]`);
                pit.querySelector('.seeds-count').innerText = seeds;
                const container = pit.querySelector('.seeds-container');
                container.innerHTML = '';
                
                // PLACEMENT NATUREL
                for (let s=0; s<seeds; s++) {
                    const seed = document.createElement('div');
                    seed.className = 'seed';
                    const radius = Math.random() * 30;
                    const angle = Math.random() * Math.PI * 2;
                    const x = 50 + radius * Math.cos(angle);
                    const y = 50 + radius * Math.sin(angle);
                    seed.style.left = `${x}%`;
                    seed.style.top = `${y}%`;
                    seed.style.transform = `translate(-50%, -50%) rotate(${Math.random() * 360}deg)`;
                    container.appendChild(seed);
                }
            });
            if (data.game_over) {
                clearInterval(gameInterval);
                showMessage("🏆 GAGNANT : " + (data.winner === 'south' ? 'SUD' : 'NORD'));
            } else {
                showMessage(data.current_turn === playerRole ? "À VOUS DE JOUER !" : "ATTENTE DE L'ADVERSAIRE...");
            }
        }

        async function handleMove(index) {
            if (!roomCode || !playerRole) return;
            const formData = new FormData();
            formData.append('room_code', roomCode);
            formData.append('index', index);
            formData.append('player_role', playerRole);
            try {
                const response = await fetch('play_move.php', { method: 'POST', body: formData });
                const result = await response.json();
                if (!result.success) { showMessage("⚠️ " + result.message); }
                else { updateGameState(); }
            } catch (e) { alert("Erreur envoi coup"); }
        }
    </script>
</body>
</html>
